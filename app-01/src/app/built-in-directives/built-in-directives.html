<div class="directive-container">
  <h2>Built-in Directives</h2>
  
  <section class="card">
    <h3>1. Structural Directives (&#64;if / &#64;for)</h3>
    <button class="btn" (click)="toggleContent()">
      {{ showContent ? 'Hide' : 'Show' }} Frameworks
    </button>
    
    @if (showContent) {
      <div class="list-container">
        <ul>
          @for (item of items; track item) {
            <li>{{ item }}</li>
          } @empty {
            <li>No items found.</li>
          }
        </ul>
      </div>
    }
  </section>

  <section class="card">
    <h3>2. Attribute Directives (ngClass & ngStyle)</h3>
    <button class="btn" (click)="toggleHighlight()">Toggle Highlight</button>
    
    <div 
      class="box"
      [ngClass]="{ 'highlighted': isHighlighted, 'normal': !isHighlighted }"
      [ngStyle]="{'font-weight': isHighlighted ? 'bold' : 'normal', 'border-radius': isHighlighted ? '12px' : '4px'}">
      This box changes its class and style dynamically!
    </div>
  </section>
</div>
