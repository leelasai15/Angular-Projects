<div class="card">
  <!-- Property Binding: [src] binds the image URL -->
  <img [src]="characterImage" alt="Character Avatar">

  <div class="info">
    
    <!-- EDIT MODE LOGIC -->
    @if (!isEditMode) {
      <!-- Interpolation: {{ }} displays the text variables -->
      <h2>{{ characterName }}</h2>
    } @else {
      <!-- Two-Way Binding: [(ngModel)] keeps input and variable in sync -->
      <input type="text" [(ngModel)]="characterName" class="edit-input">
    }

    <p>Level: {{ level }} / {{ maxLevel }}</p>

    <div class="button-group">
      <!-- 
        Event Binding: (click) calls the levelUp method 
        Property Binding: [disabled] disables the button when condition is true 
      -->
      <button 
        (click)="levelUp()" 
        [disabled]="level === maxLevel">
        Level Up!
      </button>

      <!-- Event Binding for Edit Mode -->
      <button class="edit-btn" (click)="toggleEdit()">
        {{ isEditMode ? 'Save Name' : 'Edit Name' }}
      </button>
    </div>
  </div>
</div>
