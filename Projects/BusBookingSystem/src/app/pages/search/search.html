<!-- Custom Header -->
<header class="app-header">
  <div class="container d-flex justify-content-between align-items-center">
    <div class="app-logo"><i class="bi bi-bus-front-fill mr-2"></i>Antigravity Bus</div>
    <nav class="d-flex">
      <span class="opacity-75 cursor-pointer mr-4 text-white">Home</span>
      <span class="opacity-75 cursor-pointer text-white">My Bookings</span>
    </nav>
  </div>
</header>

<div class="container">
  <!-- Search Form Hero -->
  <section class="mb-5">
    <div class="search-hero text-center text-md-start">
      <h1 class="search-title">Find Your Next Journey</h1>
      <p class="text-white opacity-75 mb-4">
        Compare bus schedules, check fare details, and book tickets instantly.
      </p>

      <div class="search-form-card">
        <form class="row g-3 align-items-center" (ngSubmit)="onSearch()">
          <!-- From Station -->
          <div class="col-lg-3 col-md-5">
            <div class="input-container">
              <label class="input-label"><i class="bi bi-geo-alt-fill"></i> From</label>
              <select class="input-field form-select shadow-none">
                <option value="">Select From Station</option>
                @for (location of locations$ | async; track location.locationId) {
                  <option [value]="location.locationId">{{ location.locationName }}</option>
                }
              </select>
            </div>
          </div>

          <!-- Swap Button -->
          <div class="col-lg-1 col-md-2 text-center">
            <div class="swap-btn-container">
              <button type="button" class="swap-btn" title="Swap Stations">
                <i class="bi bi-arrow-left-right"></i>
              </button>
            </div>
          </div>

          <!-- To Station -->
          <div class="col-lg-3 col-md-5">
            <div class="input-container">
              <label class="input-label"><i class="bi bi-pin-map-fill"></i> To</label>
              <select class="input-field form-select shadow-none">
                <option value="">Select To Station</option>
                @for (item of locations$ | async; track item.locationId) {
                  <option [value]="item.locationId">{{ item.locationName }}</option>
                }
              </select>
            </div>
          </div>

          <!-- Date -->
          <div class="col-lg-3 col-md-6">
            <div class="input-container">
              <label class="input-label"><i class="bi bi-calendar-event-fill"></i> Date</label>
              <input type="date" class="input-field shadow-none" />
            </div>
          </div>

          <!-- Search Button -->
          <div class="col-lg-2 col-md-6">
            <button type="submit" class="btn btn-search w-100 h-100">
              <i class="bi bi-search mr-2"></i> Search
            </button>
          </div>
        </form>
      </div>
    </div>
  </section>
