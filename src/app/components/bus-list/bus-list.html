<!-- Buses List -->
<section id="buses-list" class="mb-5">
    <h2 class="section-title">Available Buses</h2>

    <div class="bus-card shadow-sm">
      <div class="row g-0 align-items-stretch">
        <div class="col-md-3 bus-card-side">
          <h5 class="bus-title mb-1">IntrCity SmartBus</h5>
          <p class="bus-type mb-0">A/C Sleeper (2+1)</p>
        </div>

        <div class="col-md-9">
          <div class="bus-card-body row g-0 align-items-center">
            <div class="col-6 col-md-2 bus-stat">
              <p class="stat-value mb-0">19:00</p>
              <p class="stat-label mb-0">Departure</p>
            </div>
            <div class="col-6 col-md-2 bus-stat">
              <p class="stat-value mb-0">13h 55m</p>
              <p class="stat-label mb-0">Duration</p>
            </div>
            <div class="col-6 col-md-2 bus-stat">
              <p class="stat-value mb-0">08:55</p>
              <p class="stat-label mb-0">Arrival</p>
              <p class="arrival-date mb-0">18-Aug</p>
            </div>
            <div class="col-6 col-md-2 bus-stat">
              <p class="stat-value mb-0">4.5 <i class="bi bi-star-fill text-warning"></i></p>
              <p class="stat-label mb-0">567 Ratings</p>
            </div>
            <div class="col-6 col-md-2 bus-stat">
              <p class="stat-value mb-0">INR 935</p>
              <p class="stat-label seats-left mb-0">8 Seats available</p>
            </div>
            <div class="col-6 col-md-2 bus-action text-md-end">
              <button type="button" class="btn btn-view-seats">View Seats</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
